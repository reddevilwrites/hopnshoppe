server:
  port: 8082
  shutdown: graceful

spring:
  application:
    name: cart-service
  lifecycle:
    timeout-per-shutdown-phase: 30s
  config:
    import: optional:configserver:${SPRING_CLOUD_CONFIG_URI:http://config-server:8888}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/cart_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET}

# URL for the catalog-service REST API.
# In Docker Compose, services are reachable by container name on the default network.
catalog:
  service:
    url: ${CATALOG_SERVICE_URL:http://catalog-service:8083}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://discovery-server:8761/eureka/}
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://otel-collector:4318/v1/traces}
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true

logging:
  include-application-name: false
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "
  structured:
    format:
      console: ecs
    ecs:
      service:
        environment: ${DEPLOYMENT_ENV:dev}
        version: ${APP_VERSION:0.0.1-SNAPSHOT}
  level:
    com.hopnshoppe.cart: DEBUG
