server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # All API traffic routes through the api-gateway (port 8080).
    # The gateway validates JWTs and load-balances to the correct microservice.
    location /api/ {
        proxy_pass http://api-gateway:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth endpoints — rewritten to /api/auth/* so the gateway routes correctly.
    location /auth/ {
        proxy_pass http://api-gateway:8080/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy AEM/dispatcher assets
    location /content/ {
        proxy_pass http://host.docker.internal:8090/content/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: serve well-known paths without SPA fallback
    location /.well-known/ {
        try_files $uri =404;
    }
}
