services:
  # ---------------------------------------------------------------------------
  # auth-db — dedicated Postgres instance for auth-service (auth_db)
  # ---------------------------------------------------------------------------
  auth-db:
    image: postgres:16
    container_name: hopnshoppe-auth-db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}
    ports:
      - "5434:5432"
    volumes:
      - pgdata-auth:/var/lib/postgresql/data

  # ---------------------------------------------------------------------------
  # user-db — dedicated Postgres instance for user-service (hopnshoppe_user_db)
  # Runs on host port 5433 to avoid colliding with the legacy postgres on 5432.
  # ---------------------------------------------------------------------------
  user-db:
    image: postgres:16
    container_name: hopnshoppe-user-db
    environment:
      POSTGRES_DB: hopnshoppe_user_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}
    ports:
      - "5433:5432"
    volumes:
      - pgdata-user:/var/lib/postgresql/data

  # ---------------------------------------------------------------------------
  # OpenTelemetry Collector — single ingest point for app traces.
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    container_name: hopnshoppe-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro

  tempo:
    image: grafana/tempo:2.7.2
    container_name: hopnshoppe-tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    ports:
      - "3200:3200"
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: hopnshoppe-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus

  loki:
    image: grafana/loki:3.4.2
    container_name: hopnshoppe-loki
    command: ["-config.file=/etc/loki/config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki

  promtail:
    image: grafana/promtail:3.4.2
    container_name: hopnshoppe-promtail
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./observability/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_started

  grafana:
    image: grafana/grafana:11.5.2
    container_name: hopnshoppe-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      tempo:
        condition: service_started

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.2
    container_name: hopnshoppe-cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro

  # ---------------------------------------------------------------------------
  # Service Registry — all services register here; gateway resolves lb:// URIs
  # ---------------------------------------------------------------------------
  discovery-server:
    build: ./discovery-server
    container_name: hopnshoppe-discovery-server
    ports:
      - "8761:8761"
    environment:
      EUREKA_HOSTNAME: discovery-server
    healthcheck:
      # Eureka exposes /actuator/health via spring-boot-starter-actuator.
      # start_period is generous because Eureka's context is slow to initialise.
      test: ["CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Config Server — serves application configuration from config-repo/ files.
  # Healthcheck verifies the native file-based backend is responding.
  # ---------------------------------------------------------------------------
  config-server:
    build: ./config-server
    container_name: hopnshoppe-config-server
    ports:
      - "8888:8888"
    volumes:
      - ./config-server/config-repo:/app/config-repo:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8888/auth-service.yml || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # auth-service — credential storage and JWT issuance
  # ---------------------------------------------------------------------------
  auth-service:
    build: ./auth-service
    container_name: hopnshoppe-auth-service
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      auth-db:
        condition: service_started
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/auth_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      EUREKA_URI: http://discovery-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET not set}
      APP_VERSION: 0.0.1-SNAPSHOT
      DEPLOYMENT_ENV: dev
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev,service.version=0.0.1-SNAPSHOT
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ---------------------------------------------------------------------------
  # user-service — profile management; registers with Eureka so auth-service
  # can resolve it via Feign (lb://user-service)
  # ---------------------------------------------------------------------------
  user-service:
    build: ./user-service
    container_name: hopnshoppe-user-service
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      user-db:
        condition: service_started
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-db:5432/hopnshoppe_user_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      EUREKA_URI: http://discovery-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET not set}
      APP_VERSION: 0.0.1-SNAPSHOT
      DEPLOYMENT_ENV: dev
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev,service.version=0.0.1-SNAPSHOT
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8084/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # API Gateway — single ingress; validates JWTs and routes to downstream services
  # ---------------------------------------------------------------------------
  api-gateway:
    build: ./api-gateway
    container_name: hopnshoppe-api-gateway
    depends_on:
      discovery-server:
        condition: service_healthy
    env_file:
      - .env
    environment:
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET not set}
      EUREKA_URI: http://discovery-server:8761/eureka/
      APP_VERSION: 0.0.1-SNAPSHOT
      DEPLOYMENT_ENV: dev
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev,service.version=0.0.1-SNAPSHOT
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # cart-db — dedicated Postgres instance for cart-service (cart_db)
  # Runs on host port 5435 to avoid colliding with other DB instances.
  # ---------------------------------------------------------------------------
  cart-db:
    image: postgres:16
    container_name: hopnshoppe-cart-db
    environment:
      POSTGRES_DB: cart_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}
    ports:
      - "5435:5432"
    volumes:
      - pgdata-cart:/var/lib/postgresql/data

  # ---------------------------------------------------------------------------
  # Kafka — single-node KRaft broker (no Zookeeper).
  # Internal clients use kafka:9092; external tooling uses localhost:9092.
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: hopnshoppe-kafka
    environment:
      # KRaft mode — no Zookeeper required
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      # Auto-create topics so product-updates and product-updates.DLQ are created on first use
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

  # ---------------------------------------------------------------------------
  # catalog-service — stateless GraphQL proxy to AEM CMS (no database)
  # AEM dispatcher is expected on host port 8090 (host.docker.internal:8090).
  # ---------------------------------------------------------------------------
  catalog-service:
    build: ./catalog-service
    container_name: hopnshoppe-catalog-service
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      EUREKA_URI: http://discovery-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_VERSION: 0.0.1-SNAPSHOT
      DEPLOYMENT_ENV: dev
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev,service.version=0.0.1-SNAPSHOT
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # search-db — PostgreSQL + pgvector for the semantic search index.
  # Runs on host port 5436 to avoid colliding with other Postgres instances.
  # The init.sql script creates the vector extension, table, and indexes
  # on first boot (when the data volume is empty).
  # ---------------------------------------------------------------------------
  search-db:
    image: ankane/pgvector
    container_name: hopnshoppe-search-db
    environment:
      POSTGRES_DB: search_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}
    ports:
      - "5436:5432"
    volumes:
      - pgdata-search:/var/lib/postgresql/data
      - ./search-service/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro  # consumed by search-service; kafka consumer triggers invalidation writes here
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d search_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # ingestion-worker — Python 3.12 semantic search pipeline.
  # Consumes product-updates from Kafka, embeds with sentence-transformers,
  # and upserts into search-db (pgvector).
  # Supports FULL_UPDATE (rebuild embedding) and PRICE_UPDATE (volatile fields only).
  # Failed writes are routed to product-updates.DLQ.
  # ---------------------------------------------------------------------------
  ingestion-worker:
    build:
      context: ./ingestion-worker
      args:
        EMBED_MODEL: ${EMBED_MODEL:-BAAI/bge-base-en-v1.5}
    container_name: hopnshoppe-ingestion-worker
    depends_on:
      kafka:
        condition: service_healthy
      search-db:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SEARCH_DB_HOST: search-db
      SEARCH_DB_NAME: search_db
      SEARCH_DB_USER: ${POSTGRES_USER:-postgres}
      SEARCH_DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}
      APP_VERSION: 0.0.1-SNAPSHOT
      DEPLOYMENT_ENV: dev
      METRICS_PORT: 9108
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev,service.version=0.0.1-SNAPSHOT
      OTEL_SERVICE_NAME: ingestion-worker
      EMBED_MODEL: ${EMBED_MODEL:-BAAI/bge-base-en-v1.5}
    restart: on-failure

  # ---------------------------------------------------------------------------
  # search-service — Python FastAPI hybrid semantic search endpoint.
  # GET /search?q=...&limit=...  →  hybrid ranking (70% vector + 30% FTS)
  # Returns denormalized product docs directly; no catalog-service call per result.
  # ---------------------------------------------------------------------------
  search-service:
    build:
      context: ./search-service
      args:
        EMBED_MODEL: ${EMBED_MODEL:-BAAI/bge-base-en-v1.5}
    container_name: hopnshoppe-search-service
    depends_on:
      discovery-server:
        condition: service_healthy
      search-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SEARCH_DB_HOST: search-db
      SEARCH_DB_NAME: search_db
      SEARCH_DB_USER: ${POSTGRES_USER:-postgres}
      SEARCH_DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_URI: http://discovery-server:8761/eureka/
      APP_VERSION: 0.0.1-SNAPSHOT
      DEPLOYMENT_ENV: dev
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev,service.version=0.0.1-SNAPSHOT
      OTEL_SERVICE_NAME: search-service
      EMBED_MODEL: ${EMBED_MODEL:-BAAI/bge-base-en-v1.5}
    ports:
      - "8085:8085"
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8085/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # cart-service — cart state; calls catalog-service for product enrichment
  # ---------------------------------------------------------------------------
  cart-service:
    build: ./cart-service
    container_name: hopnshoppe-cart-service
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      cart-db:
        condition: service_started
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://cart-db:5432/cart_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      EUREKA_URI: http://discovery-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET not set}
      CATALOG_SERVICE_URL: http://catalog-service:8083
      APP_VERSION: 0.0.1-SNAPSHOT
      DEPLOYMENT_ENV: dev
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev,service.version=0.0.1-SNAPSHOT
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Frontend — React SPA served by nginx.
  # nginx proxies /api/* and /auth/* to api-gateway:8080.
  # ---------------------------------------------------------------------------
  frontend:
    build: ./caas-frontend
    container_name: hopnshoppe-frontend
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  pgdata-auth:
  pgdata-user:
  pgdata-cart:
  pgdata-search:
  kafka-data:
  grafana-data:
  prometheus-data:
  loki-data:
  tempo-data:
