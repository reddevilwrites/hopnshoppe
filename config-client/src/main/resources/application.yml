spring:
  application:
    name: config-client   # same name used in config server
  config:
    import: optional:configserver:${SPRING_CLOUD_CONFIG_URI:http://config-server:8888}
  cloud:
    config:
      enabled: ${SPRING_CLOUD_CONFIG_ENABLED:true}
      fail-fast: false
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

server:
  port: 8081
